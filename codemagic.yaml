workflows:
  ios-workflow:
    name: iOS Workflow
    max_build_duration: 60
    instance_type: mac_mini_m1

    environment:
      vars:
        XCODE_WORKSPACE: "ios/medicare.xcworkspace"
        XCODE_SCHEME: "medicare"

    scripts:
      - name: Install npm dependencies
        script: |
          npm install

      - name: Install CocoaPods dependencies
        script: |
          cd ios && pod install

      - name: Build iOS app
        script: |
          xcodebuild \
            -workspace "$XCODE_WORKSPACE" \
            -scheme "$XCODE_SCHEME" \
            -sdk iphoneos \
            -configuration Release \
            archive \
            -archivePath $CM_BUILD_DIR/medicare.xcarchive

    artifacts:
      - $CM_BUILD_DIR/build/**/*.ipa