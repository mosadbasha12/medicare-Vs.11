workflows:
  expo-ios-build:
    name: Expo iOS Build

    max_build_duration: 60

    environment:
      groups:
        - codemagic-secure

    scripts:
      - name: Install dependencies
        script: |
          npm install

      - name: Install EAS CLI
        script: |
          npm install -g eas-cli

      - name: Expo prebuild
        script: |
          npx expo prebuild

      - name: Build iOS app
        script: |
          export EXPO_TOKEN=$EXPO_TOKEN
          eas build --platform ios --profile preview --non-interactive

    artifacts:
      - "*.ipa"