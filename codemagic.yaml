workflows:
  expo-ios-build:
    name: Expo iOS Build

    max_build_duration: 60

    environment:
      groups:
        - codemagic-secure

    scripts:
      - name: Install dependencies
        script: |
          npm install

      - name: Install EAS CLI
        script: |
          npm install -g eas-cli

      - name: Login to Expo
        script: |
          eas whoami || eas login --token $EXPO_TOKEN

      - name: Build iOS app
        script: |
          eas build --platform ios --profile preview --non-interactive

    artifacts:
      - "*.ipa"