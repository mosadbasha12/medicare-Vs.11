name: Build unsigned iOS IPA

on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-15
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate iOS project
        run: npx expo prebuild --platform ios --clean --non-interactive

      - name: Install CocoaPods dependencies
        working-directory: ios
        run: pod install

      - name: Build unsigned iOS app
        run: |
          set -euo pipefail
          WORKSPACE="$(find ios -maxdepth 1 -name '*.xcworkspace' -print -quit)"
          SCHEME="$(node -p "require('./app.json').expo.name")"
          xcodebuild \
            -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build/ios \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build

      - name: Package IPA
        run: |
          set -euo pipefail
          APP_PATH="$(find build/ios/Build/Products/Release-iphoneos -name '*.app' -print -quit)"
          if [ -z "$APP_PATH" ]; then
            echo "Could not find built .app"
            exit 1
          fi

          if [ -d "$APP_PATH/Frameworks" ]; then
            find "$APP_PATH/Frameworks" \
              \( -name '*.framework' -o -name '*.dylib' \) \
              -print0 | while IFS= read -r -d '' ITEM; do
                /usr/bin/codesign --force --sign - --timestamp=none "$ITEM"
              done
          fi

          find "$APP_PATH" -name '*.appex' -print0 | while IFS= read -r -d '' ITEM; do
            /usr/bin/codesign --force --sign - --timestamp=none "$ITEM"
          done

          /usr/bin/codesign --force --sign - --timestamp=none "$APP_PATH"
          /usr/bin/codesign --verify --deep --strict "$APP_PATH"

          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          /usr/bin/zip -qry medicare-unsigned.ipa Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: medicare-ios-unsigned-ipa
          path: medicare-unsigned.ipa
