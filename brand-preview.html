<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediCare - الهوية البصرية</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #190A12;
            color: #FFFFFF;
            padding: 40px;
            min-height: 100vh;
        }
        .header {
            text-align: center;
            margin-bottom: 60px;
        }
        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        .header h1 span { color: #FF6B7A; }
        .header p { color: #E6B7C1; font-size: 1.1rem; }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 107, 122, 0.16);
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            backdrop-filter: blur(10px);
        }
        .card h3 {
            margin: 20px 0 10px;
            color: #FF6B7A;
        }
        .card p {
            color: #E6B7C1;
            font-size: 0.9rem;
        }
        .card img {
            max-width: 100%;
            height: auto;
            border-radius: 12px;
        }
        
        .logo-large { width: 200px; height: 200px; }
        .logo-medium { width: 120px; height: 120px; }
        .logo-small { width: 64px; height: 64px; }
        .logo-tiny { width: 32px; height: 32px; }
        
        .colors {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 20px;
        }
        .color-swatch {
            width: 80px;
            text-align: center;
        }
        .color-box {
            width: 60px;
            height: 60px;
            border-radius: 12px;
            margin: 0 auto 8px;
            border: 2px solid rgba(255, 255, 255, 0.2);
        }
        .color-swatch span {
            font-size: 0.75rem;
            color: #E6B7C1;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Medi<span>Care</span></h1>
        <p>الهوية البصرية للتطبيق</p>
    </div>

    <div class="grid">
        <!-- App Icon -->
        <div class="card">
            <img src="./assets/icon.png" alt="App Icon" class="logo-large">
            <h3>أيقونة التطبيق</h3>
            <p>1024 × 1024 px</p>
        </div>

        <!-- Splash Icon -->
        <div class="card">
            <img src="./assets/splash-icon.png" alt="Splash Icon" class="logo-large">
            <h3>شاشة البداية</h3>
            <p>512 × 512 px</p>
        </div>

        <!-- Adaptive Icon -->
        <div class="card">
            <img src="./assets/adaptive-icon.png" alt="Adaptive Icon" class="logo-medium">
            <h3>أيقونة Android المتكيفة</h3>
            <p>1080 × 1080 px</p>
        </div>

        <!-- Favicon -->
        <div class="card">
            <img src="./assets/favicon.png" alt="Favicon" class="logo-small">
            <h3>أيقونة المتصفح</h3>
            <p>48 × 48 px</p>
        </div>

        <!-- Colors -->
        <div class="card">
            <h3>لوحة الألوان</h3>
            <div class="colors">
                <div class="color-swatch">
                    <div class="color-box" style="background: #D7263D;"></div>
                    <span>#D7263D</span>
                </div>
                <div class="color-swatch">
                    <div class="color-box" style="background: #FF6B7A;"></div>
                    <span>#FF6B7A</span>
                </div>
                <div class="color-swatch">
                    <div class="color-box" style="background: #F05A68;"></div>
                    <span>#F05A68</span>
                </div>
                <div class="color-swatch">
                    <div class="color-box" style="background: #190A12;"></div>
                    <span>#190A12</span>
                </div>
            </div>
        </div>

        <!-- SVG Logo -->
        <div class="card">
            <object type="image/svg+xml" data="./assets/logo.svg" class="logo-large" style="width: 200px; height: 200px;"></object>
            <h3>الشعار (SVG)</h3>
            <p>قابل للتكبير بدون فقدان الجودة</p>
        </div>
    </div>
</body>
</html>
